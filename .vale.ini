StylesPath = styles

MinAlertLevel = warning

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.1/ai-tells.zip

Vocab = Caelus

# Published docs + README
[docs/**.md]
BasedOnStyles = Vale, ai-tells, Caelus
ai-tells.EmDashUsage = suggestion
ai-tells.SelfReference = NO

[*.md]
BasedOnStyles = Vale, ai-tells, Caelus
ai-tells.EmDashUsage = suggestion

# Extracted web copy — slop rules, not spelling (code-adjacent terms)
[.web-prose-extract.md]
BasedOnStyles = Vale, ai-tells, Caelus
Vale.Spelling = NO
Vale.Terms = NO
ai-tells.FormalRegister = NO
ai-tells.VerbTricolon = suggestion
ai-tells.ContrastiveFormulas = warning

# Style guides list banned phrases as examples — spelling only
[docs/editorial-voice.md]
BasedOnStyles = Vale

[docs/ai-slop-style-sheet.md]
BasedOnStyles = Vale

# Package README — slop rules; code literals trip Terms/Spelling
[packages/**/README.md]
BasedOnStyles = Vale, ai-tells, Caelus
Vale.Terms = NO
Vale.Spelling = NO
ai-tells.FormalRegister = NO

# Internal patch notes — relaxed
[PATCHES.md]
BasedOnStyles = Vale, ai-tells
ai-tells.EmDashUsage = NO
ai-tells.OverusedVocabulary = NO

# Agent docs — code-heavy, same treatment as package READMEs
[docs/agents.md]
BasedOnStyles = Vale, ai-tells, Caelus
Vale.Terms = NO
Vale.Spelling = NO
ai-tells.FormalRegister = NO
