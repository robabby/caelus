name: ci
on:
  push: { branches: [main, dev] }
  pull_request:
jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build -w caelus
      # The conformance suite is the contract: golden checks ported
      # from the Python reference. A red suite blocks merge. It also emits
      # conformance-stats.json (check count, worst diff) for the claims linter.
      - run: CAELUS_STATS_OUT=conformance-stats.json node packages/caelus/dist/test/golden.test.js
      # query engine: TS when() must match the Python reference's intervals
      - run: node packages/caelus/dist/test/query-golden.test.js
      # derived charts: TS derivations must match the Python reference
      - run: node packages/caelus/dist/test/derived-golden.test.js
      # turbo tier: the TS evaluator must reproduce the Python evaluator on the pack
      - run: node packages/caelus/dist/test/turbo-golden.test.js
      # electional primitives: TS port must match the Python reference
      - run: node packages/caelus/dist/test/electional-golden.test.js
      # Hellenistic lots (Arabic parts): TS port must match the Python reference
      - run: node packages/caelus/dist/test/lots-golden.test.js
      # profections (annual + monthly): TS port must match the Python reference
      - run: node packages/caelus/dist/test/profections-golden.test.js
      # firdaria (planetary time-lord periods): TS port must match the reference
      - run: node packages/caelus/dist/test/firdaria-golden.test.js
      # zodiacal releasing (aphesis): TS port must match the Python reference
      - run: node packages/caelus/dist/test/releasing-golden.test.js
      # Vedic (nakshatras + Vimshottari dasha): TS port must match the reference
      - run: node packages/caelus/dist/test/vedic-golden.test.js
      # primary directions (to the angles): TS port must match the reference
      - run: node packages/caelus/dist/test/directions-golden.test.js
      # vargas (divisional charts): TS port must match the Python reference
      - run: node packages/caelus/dist/test/vargas-golden.test.js
      # Yogini dasha (36-year nakshatra cycle): TS port must match the reference
      - run: node packages/caelus/dist/test/yogini-golden.test.js
      # Vedic yogas (placement combinations): TS port must match the reference
      - run: node packages/caelus/dist/test/yogas-golden.test.js
      # Ashtottari dasha (108-year conditional): TS port must match the reference
      - run: node packages/caelus/dist/test/ashtottari-golden.test.js
      # raja/dhana yogas (lordship + drishti): TS port must match the reference
      - run: node packages/caelus/dist/test/rajayoga-golden.test.js
      # scan / rankMoments ergonomics: deterministic unit checks (TS-only layer)
      - run: node packages/caelus/dist/test/scan.test.js
      # spherical geometry (3D aspects): TS port must match the Python reference
      - run: node packages/caelus/dist/test/spherical-golden.test.js
      # astrocartography angle lines: TS port must match the Python reference
      - run: node packages/caelus/dist/test/astrocartography-golden.test.js
      # graphic-ephemeris collector: deterministic unit checks (TS-only layer)
      - run: node packages/caelus/dist/test/ephemeris.test.js
      # chart feature space + similarity: TS port must match the Python reference
      - run: node packages/caelus/dist/test/features-golden.test.js
      # feature recovery: signal vs a matched shuffled null, plus a tunability knob
      - run: node packages/caelus/dist/test/features-experiment.test.js
      # geometric compiler (constraints -> wheel): loss golden + solver behaviour
      - run: node packages/caelus/dist/test/compiler-golden.test.js
      # interpretation corpus: compiled rules must bind to legal atoms only
      - run: npm run build -w caelus-delineations-pd
      - run: npm run test -w caelus-delineations-pd
      - run: npm run build -w caelus-mcp
      - run: npm run facts:sync
      - run: node packages/caelus-mcp/smoke.mjs
      # MCP-layer oracle suite: golden checks can't see server.ts (PATCHES #2)
      - run: node packages/caelus-mcp/verify_tools.mjs
      # MCP integration suite: response schema validation + frozen golden payloads
      - run: node packages/caelus-mcp/integration.test.mjs
      # MCP tool-selection eval, self-check mode: fixtures' expected args must be
      # schema-valid against the live tool schemas and satisfy their own argChecks.
      # No model calls, no API keys in CI; live runs are opt-in via EVAL_MODEL.
      - run: node packages/caelus-mcp/eval/run.mjs
      # timezone resolution: tzdb golden cases + 200-case round-trip property
      - run: npm run build -w caelus-birth
      - run: node packages/birth/dist/test/golden.test.js
      # chart wheel: SSR render of real charts + collision-fan unit checks
      - run: npm run build -w caelus-wheel
      - run: node packages/wheel/dist/test/render.test.js
      # 3D chart sphere: SSR render + latitude-matters check
      - run: node packages/wheel/dist/test/sphere.test.js
      # astrocartography map: SSR render of the relocation lines
      - run: node packages/wheel/dist/test/astromap.test.js
      # graphic ephemeris: SSR render of the time-series line graph
      - run: node packages/wheel/dist/test/ephemerisgraph.test.js
      # cross-package journey: local time -> chart -> SVG wheel, end to end
      - run: node packages/wheel/dist/test/integration.test.js
      # per-entrypoint bundle sizes (esbuild): informational, prints the table
      # the data-tiers doc quotes. Per-target try/catch keeps it non-blocking.
      - run: npm run bundle-sizes
      # generate the API reference markdown before building so the
      # /docs/api pages have content to prerender (mirrors vercel-build).
      - run: npm run docs:api
      # client-side docs/API search index (public/search-index.json)
      - run: npm run search:index
      - run: npm run build -w web
      # crawl every built route + internal link on an ephemeral server: catches
      # 500s, soft 404s, and dead in-site links that `next build` reports green.
      - run: npm run smoke:web
      # llms.txt must track package versions and stay in sync with the site
      - run: node scripts/check-llms.mjs
      # prose numeric claims must match the generated stats + accuracy table
      - run: npm run lint:claims
      # em-dash gate: no `—` or &mdash; in rendered site prose (pure node, so it
      # gates every PR here, not only in the Vale-dependent prose job below).
      - run: npm run lint:emdash

  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22 }
      - name: Install Vale
        # Pull the pinned release binary directly from GitHub. The old
        # `curl … install.vale.sh | sh` pipe swallowed a failed download
        # (the pipe masked the script's exit code), so Vale silently never
        # installed and the prose job failed with "vale not found".
        # set -euo pipefail makes any future install regression fail loudly.
        run: |
          set -euo pipefail
          curl -sSfL -o vale.tar.gz \
            https://github.com/errata-ai/vale/releases/download/v3.13.0/vale_3.13.0_Linux_64-bit.tar.gz
          tar -xzf vale.tar.gz vale
          sudo mv vale /usr/local/bin/
          vale --version
      - run: npm run lint:prose
