name: release
# Publish npm packages with provenance attestation (four core packages +
# caelus-delineations-pd on its own semver). Trigger: push a tag like v0.1.0,
# published versions come from the package.json files either way).
# Requires the NPM_TOKEN secret (automation token for the npm account
# that owns the caelus* package names) — see docs/releasing.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write   # npm --provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # the full verification chain gates every publish
      - run: node scripts/check-versions.mjs   # npm × PyPI × server.json must agree
      - run: npm run build -w caelus
      - run: node packages/caelus/dist/test/golden.test.js
      - run: npm run build -w caelus-delineations-pd
      - run: npm run test -w caelus-delineations-pd
      - run: npm run build -w caelus-mcp
      - run: node packages/caelus-mcp/smoke.mjs
      - run: node packages/caelus-mcp/verify_tools.mjs
      - run: npm run build -w caelus-birth
      - run: node packages/birth/dist/test/golden.test.js
      - run: npm run build -w caelus-wheel
      - run: node packages/wheel/dist/test/render.test.js
      - run: node scripts/check-llms.mjs
      # engine first: the others depend on it. Each publish skips when the
      # version is already on the registry, so tag-push and dispatch triggers
      # are idempotent and a re-run never fails on an existing version.
      - run: bash scripts/publish-if-missing.sh caelus packages/caelus
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: bash scripts/publish-if-missing.sh caelus-mcp packages/caelus-mcp
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: bash scripts/publish-if-missing.sh caelus-birth packages/birth
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: bash scripts/publish-if-missing.sh caelus-wheel packages/wheel
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: bash scripts/publish-if-missing.sh caelus-delineations-pd packages/caelus-delineations-pd
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }

  # Python reference engine → PyPI. No token: PyPI Trusted Publishing (OIDC)
  # mints a short-lived credential from this job's id-token. One-time setup on
  # PyPI: project caelus-engine → Settings → Publishing → add a GitHub trusted
  # publisher (owner heavyblotto, repo caelus, workflow release.yml, the
  # environment below). skip-existing makes tag-push + dispatch idempotent.
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      # v6 runs on Node 24; v5 was on the Node 20 runtime GitHub is removing.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          skip-existing: true

  # GitHub Release from the matching CHANGELOG.md section. Tag-push only (a
  # dispatch has no tag to attach to). Gated on the publishes so a release only
  # appears once the packages are live, and idempotent: a re-run skips a release
  # that already exists, matching the publish jobs' re-run safety.
  github-release:
    runs-on: ubuntu-latest
    needs: [publish, pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create the release
    steps:
      - uses: actions/checkout@v5
      - name: Release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping."
            exit 0
          fi
          # The CHANGELOG heading is "## <tag> — <summary>" (e.g.
          # "## v0.16.0 — chart synthesis: …"). The release title is that
          # heading minus the "## "; the body is everything up to the next
          # "## ", with the date its first line.
          title="$(awk -v tag="$GITHUB_REF_NAME" '
            /^## / && $2 == tag { sub(/^## /, ""); print; exit }
          ' CHANGELOG.md)"
          notes="$(awk -v tag="$GITHUB_REF_NAME" '
            /^## / { if (found) exit; if ($2 == tag) { found = 1; next } }
            found { print }
          ' CHANGELOG.md)"
          if [ -n "$title" ] && [ -n "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            printf '%s\n' "$notes" > /tmp/release-notes.md
            gh release create "$GITHUB_REF_NAME" --verify-tag \
              --title "$title" --notes-file /tmp/release-notes.md
          else
            echo "No CHANGELOG section for $GITHUB_REF_NAME; falling back to generated notes."
            gh release create "$GITHUB_REF_NAME" --verify-tag \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
